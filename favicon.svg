<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f12"/>
      <stop offset="100%" style="stop-color:#16161a"/>
    </linearGradient>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#bg-grad)"/>

  <!-- Subtle border -->
  <rect width="64" height="64" rx="14" ry="14" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- ZD text -->
  <text
    x="32"
    y="44"
    text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-weight="700"
    font-size="28"
    letter-spacing="-1"
    fill="url(#text-grad)"
  >ZD</text>
</svg>
